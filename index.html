<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student - Literacy Assessment</title>
    <style>
        :root { --primary: #2563eb; --success: #22c55e; --danger: #ef4444; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; text-align: center; padding: 20px; background-color: var(--bg); color: #1e293b; }
        #quiz-card { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: inline-block; max-width: 800px; width: 100%; margin-top: 20px; }
        
        /* Hides the transcription prompt from the UI entirely */
        #transcript { display: none; }

        .input-group { margin-bottom: 20px; text-align: left; max-width: 400px; margin: 0 auto 20px auto; }
        label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 14px; }
        input { width: 100%; padding: 12px; font-size: 16px; border-radius: 8px; border: 1px solid #cbd5e1; box-sizing: border-box; outline: none; }
        .btn { padding: 12px 24px; font-size: 16px; font-weight: 600; border-radius: 8px; cursor: pointer; border: none; transition: 0.2s; margin: 5px; }
        .btn-primary { background-color: var(--primary); color: white; width: 100%; }
        #btnSpeak { background-color: var(--success); color: white; font-size: 20px; padding: 20px 40px; border-radius: 50px; margin: 20px 0; }
        #btnSpeak:disabled { background-color: #cbd5e1; cursor: not-allowed; }
        #question { font-size: 32px; font-weight: 700; margin: 20px 0; color: #0f172a; }
        #timer-display { font-size: 20px; font-weight: bold; color: var(--danger); margin-bottom: 15px; }
        #result-feedback { font-size: 28px; font-weight: 800; margin-bottom: 10px; min-height: 40px; }
        .hidden { display: none !important; }
        .nav-controls { margin-top: 20px; }
        .btn-nav { background: #64748b; color: white; padding: 12px 24px; }
        #score-display { font-size: 18px; font-weight: bold; color: var(--primary); }
    </style>
</head>
<body>

<div id="quiz-card">
    <!-- LOGIN SECTION -->
    <div id="setup-section">
        <h1>Student Portal</h1>
        <div class="input-group">
            <label>Student ID</label>
            <input type="text" id="studentID" placeholder="Enter ID">
            <div id="studentIdError" class="hidden" style="color: var(--danger); margin-top: 5px; font-weight: 600;">ID not enrolled.</div>
        </div>
        <div class="input-group">
            <label>Grade & Section</label>
            <input type="text" id="gradeSection" placeholder="e.g. 10-Diamond">
        </div>
        <button class="btn btn-primary" id="loginBtn">Login</button>
    </div>

    <!-- MAIN MENU -->
    <div id="dashboard-section" class="hidden">
        <h1 id="welcomeHeader">Welcome!</h1>
        <div style="display: flex; justify-content: center; gap: 20px; flex-wrap: wrap;">
            <button class="btn" id="navBooks" style="background: #8b5cf6; color: white; padding: 20px;">📚 Books</button>
            <button class="btn" id="navQuiz" style="background: var(--success); color: white; padding: 20px;">🎤 Quizzes</button>
        </div>
        <br><button class="btn" onclick="location.reload()" style="background:#64748b; color:white;">Logout</button>
    </div>

    <!-- QUIZ SELECTION -->
    <div id="quiz-menu-section" class="hidden">
        <h1>Available Quizzes</h1>
        <div id="quizListContainer" style="display: flex; flex-direction: column; align-items: center; gap: 10px;"></div>
        <button class="btn" id="backFromQuizMenu" style="background:#64748b; color:white; margin-top: 20px;">Back</button>
    </div>

    <!-- ASSESSMENT PANEL -->
    <div id="quiz-section" class="hidden">
        <div id="timer-display" class="hidden">Time Left: --s</div>
        <div id="question"></div>
        <button id="btnSpeak" class="btn">🎤 Tap to Answer</button>
        
        <!-- This div is still in the code for logic, but hidden by CSS -->
        <div id="transcript"></div> 
        
        <div id="result-feedback"></div>
        <div id="score-display">Score: 0 / 0</div>

        <div id="manual-nav" class="nav-controls hidden">
            <button id="nextBtn" class="btn btn-nav">Next Question →</button>
        </div>
    </div>

    <!-- BOOKS PANEL -->
    <div id="books-section" class="hidden">
        <h2>📚 Library</h2>
        <div id="booksList"></div>
        <button class="btn" id="backFromBooks" style="background:#64748b; color:white; margin-top: 20px;">Back</button>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, onSnapshot, query, where, getDocs, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// --- PASTE YOUR FIREBASE CONFIG HERE ---
const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "teacherd-c39ea.firebaseapp.com",
    projectId: "teacherd-c39ea",
    storageBucket: "teacherd-c39ea.appspot.com",
    messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
    appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let currentQuizzes = [];
let currentBooks = [];
let activeQuiz = null;
let currentIndex = 0;
let timerInterval = null;
let scores = {};
let retriesUsed = 0;

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const recognition = new SpeechRecognition();
recognition.lang = 'en-US';
recognition.interimResults = false;
recognition.continuous = false;

function showSection(id) {
    ['setup-section', 'dashboard-section', 'quiz-menu-section', 'quiz-section', 'books-section'].forEach(s => {
        document.getElementById(s).classList.add('hidden');
    });
    document.getElementById(id).classList.remove('hidden');
}

document.getElementById('loginBtn').onclick = async () => {
    const sId = document.getElementById('studentID').value.trim();
    if(!sId) return alert("Enter Student ID");
    const q = query(collection(db, "enrolled"), where("studentId", "==", sId));
    const snap = await getDocs(q);
    if (snap.empty) {
        document.getElementById('studentIdError').classList.remove('hidden');
    } else {
        const student = snap.docs[0].data();
        document.getElementById('welcomeHeader').innerText = `Hello, ${student.name}!`;
        showSection('dashboard-section');
    }
};

onSnapshot(collection(db, "books"), (snap) => { currentBooks = snap.docs.map(d => d.data()); });
onSnapshot(collection(db, "quizzes"), (snap) => { currentQuizzes = snap.docs.map(d => ({id: d.id, ...d.data()})); });

document.getElementById('navBooks').onclick = () => {
    document.getElementById('booksList').innerHTML = currentBooks.map(b => `
        <div style="border:1px solid #e2e8f0; padding:15px; margin:10px; border-radius:8px; text-align:left; background:#fff;">
            <strong>${b.title}</strong><br>
            <a href="${b.link}" target="_blank" style="font-size:14px; text-decoration:none; color:var(--primary);">Open Document →</a>
        </div>`).join('');
    showSection('books-section');
};

document.getElementById('navQuiz').onclick = () => {
    const container = document.getElementById('quizListContainer');
    container.innerHTML = currentQuizzes.map(q => `<button class="btn btn-primary" id="btn-q-${q.id}">${q.name} ${q.locked ? '🔒' : ''}</button>`).join('');
    currentQuizzes.forEach(q => {
        document.getElementById(`btn-q-${q.id}`).onclick = () => {
            if(q.locked) return alert("Locked");
            startQuiz(q);
        };
    });
    showSection('quiz-menu-section');
};

function startQuiz(quiz) {
    activeQuiz = quiz; currentIndex = 0; scores = {};
    showSection('quiz-section');
    loadQuestion();
}

function loadQuestion() {
    clearInterval(timerInterval);
    retriesUsed = 0;
    if (currentIndex >= activeQuiz.q.length) { saveFinalResults(); return; }
    document.getElementById('question').innerText = activeQuiz.q[currentIndex];
    document.getElementById('result-feedback').innerText = "";
    document.getElementById('btnSpeak').classList.remove('hidden');
    document.getElementById('btnSpeak').disabled = false;
    document.getElementById('btnSpeak').innerText = "🎤 Tap to Answer";
    document.getElementById('manual-nav').classList.add('hidden');
    document.getElementById('score-display').innerText = `Score: ${calculateScore()} / ${activeQuiz.q.length}`;
    if (parseInt(activeQuiz.timeLimit) > 0) {
        document.getElementById('timer-display').classList.remove('hidden');
        startCountdown(parseInt(activeQuiz.timeLimit));
    }
}

function startCountdown(sec) {
    let timeLeft = sec;
    document.getElementById('timer-display').innerText = `Time Left: ${timeLeft}s`;
    timerInterval = setInterval(() => {
        timeLeft--;
        document.getElementById('timer-display').innerText = `Time Left: ${timeLeft}s`;
        if(timeLeft <= 0) { clearInterval(timerInterval); currentIndex++; loadQuestion(); }
    }, 1000);
}

document.getElementById('btnSpeak').onclick = () => {
    recognition.start();
    document.getElementById('btnSpeak').innerText = "Listening...";
    document.getElementById('btnSpeak').disabled = true;
};

recognition.onresult = (event) => {
    const speech = event.results[0][0].transcript.toLowerCase().trim();
    const keywords = (activeQuiz.a[currentIndex] || "").toLowerCase().split('|').map(k => k.trim());
    const isCorrect = keywords.some(k => speech.includes(k) && k !== "");

    if (isCorrect) {
        document.getElementById('result-feedback').innerHTML = "<span style='color:var(--success)'>Correct! ✅</span>";
        scores[currentIndex] = true;
        document.getElementById('btnSpeak').classList.add('hidden');
        proceed();
    } else {
        retriesUsed++;
        const maxRetries = parseInt(activeQuiz.retries) || 0;
        if (retriesUsed <= maxRetries) {
            document.getElementById('result-feedback').innerHTML = `<span style='color:#f59e0b'>Try again! (${retriesUsed}/${maxRetries})</span>`;
            document.getElementById('btnSpeak').disabled = false;
            document.getElementById('btnSpeak').innerText = "🎤 Tap to Retry";
        } else {
            document.getElementById('result-feedback').innerHTML = "<span style='color:var(--danger)'>Next Question... ❌</span>";
            document.getElementById('btnSpeak').classList.add('hidden');
            proceed();
        }
    }
};

function proceed() {
    clearInterval(timerInterval);
    if (parseInt(activeQuiz.timeLimit) > 0) {
        setTimeout(() => { currentIndex++; loadQuestion(); }, 2000);
    } else {
        document.getElementById('manual-nav').classList.remove('hidden');
        document.getElementById('nextBtn').innerText = (currentIndex === activeQuiz.q.length - 1) ? "Finish" : "Next →";
    }
}

document.getElementById('nextBtn').onclick = () => { currentIndex++; loadQuestion(); };
function calculateScore() { return Object.keys(scores).length; }

async function saveFinalResults() {
    const finalScoreStr = `${calculateScore()} / ${activeQuiz.q.length}`;
    await addDoc(collection(db, "results"), {
        studentId: document.getElementById('studentID').value.trim(),
        gradeSection: document.getElementById('gradeSection').value.trim(),
        quizName: activeQuiz.name,
        score: finalScoreStr,
        timestamp: serverTimestamp()
    });
    alert("Completed!");
    showSection('dashboard-section');
}
</script>
</body>
</html>
